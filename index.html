<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Career Tree</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a0005, #0d0d0d);
  font-family: Arial;
  overflow: hidden;
}

#canvas {
  width: 100vw;
  height: 100vh;
  overflow: auto;
}

.node {
  position: absolute;
  padding: 4px 8px;
  background: rgba(255,77,109,0.1);
  border: 1px solid rgba(255,77,109,0.3);
  border-radius: 6px;
  font-size: 10px;
  color: white;
  white-space: nowrap;
}
</style>
</head>

<body>

<div id="canvas"></div>

<script>

// 🔥 PASTE YOUR FULL 1020 JOBS HERE
const jobs = [
"Software Engineer",
"Senior Software Engineer",
"Full Stack Developer",
"Backend Developer",
"Frontend Developer",
// 👉 PASTE ALL YOUR 1000 JOBS HERE
];

// 🚀 AUTO-GRID (TREE-LIKE FLOW)
const canvas = document.getElementById("canvas");

let x = 50;
let y = 50;
let col = 0;

jobs.forEach((job, i) => {

  const div = document.createElement("div");
  div.className = "node";
  div.innerText = job;

  div.style.left = x + "px";
  div.style.top = y + "px";

  canvas.appendChild(div);

  y += 30;
  col++;

  // NEW COLUMN (like branches)
  if (col > 40) {
    col = 0;
    y = 50;
    x += 180;
  }

});
</script>

</body>
</html>
