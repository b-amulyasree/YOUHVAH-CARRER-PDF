<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #2b0a12, #0a0003 80%);
      font-family: 'Poppins', sans-serif;
    }

    #title {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #ff4d6d;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,77,109,0.8);
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="title">CAREER UNIVERSE</div>
<div id="3d-graph"></div>

<script>
const Graph = ForceGraph3D()(document.getElementById('3d-graph'));

// FULL JOB LIST (sample expandable, you will extend)
const jobTree = {
  "Careers": ["Tech", "Finance", "Creative"],

  "Tech": [
    "Software Engineer","AI Engineer","Data Scientist","Backend Developer","Frontend Developer"
  ],

  "Finance": [
    "Investment Banker","Financial Analyst","Portfolio Manager","Quantitative Trader"
  ],

  "Creative": [
    "Actor","Designer","Photographer","Video Editor"
  ]
};

let nodes = [{ id: 'Careers', level: 0 }];
let links = [];

function updateGraph() {
  Graph.graphData({ nodes, links });
}

function addChildren(node) {
  const children = jobTree[node.id];
  if (!children) return;

  children.forEach(child => {
    if (!nodes.find(n => n.id === child)) {
      nodes.push({ id: child, level: node.level + 1 });
      links.push({ source: node.id, target: child });
    }
  });

  updateGraph();
}

Graph
  .graphData({ nodes, links })
  .nodeLabel('id')
  .nodeAutoColorBy('level')

  .nodeThreeObject(node => {
    const sprite = new THREE.Sprite(
      new THREE.SpriteMaterial({
        color: node.level === 0 ? 0xff1e56 : node.level === 1 ? 0xff4d6d : 0xff8fa3,
        transparent: true,
        opacity: 0.95
      })
    );

    sprite.scale.set(4, 4, 1);
    return sprite;
  })

  .onNodeClick(node => {
    addChildren(node);

    // zoom to clicked node
    const distance = 40;
    const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);

    Graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node,
      1000
    );
  })

  .linkWidth(1.5)
  .linkColor(() => '#ff4d6d')
  .linkOpacity(0.4)
  .backgroundColor('#0a0003');

Graph.cameraPosition({ z: 120 });
Graph.d3VelocityDecay(0.3);

// INITIAL ROOT EXPAND
addChildren({ id: 'Careers', level: 0 });

// TESTS
console.assert(typeof THREE !== 'undefined', 'THREE loaded');
console.assert(nodes.length > 0, 'Nodes exist');

</script>

</body>
</html>
