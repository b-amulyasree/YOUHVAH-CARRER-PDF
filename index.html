<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Career Roadmap</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  background: linear-gradient(180deg, #1a0005, #3b0a1a, #0d0d0d);
}

/* HEADER */
h1 {
  text-align: center;
  padding: 30px;
  font-size: 42px;
  letter-spacing: 2px;
}

/* SECTION */
.section {
  margin: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* TITLE */
.section h2 {
  cursor: pointer;
  color: #ff4d6d;
}

/* JOB LIST */
.jobs {
  display: none;
  margin-top: 10px;
  flex-wrap: wrap;
  gap: 6px;
}

.job {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(255, 77, 109, 0.1);
  border: 1px solid rgba(255, 77, 109, 0.3);
}

.job:hover {
  background: #ff4d6d;
  color: black;
}
</style>

</head>

<body>

<h1>🍷 Career Roadmap</h1>

<div id="container"></div>

<script>

// 🔥 YOUR JOB DATA (AUTO SYSTEM)
const data = {
  "💻 Tech": [
    "Software Engineer","AI Engineer","Data Scientist","Machine Learning Engineer",
    "Blockchain Developer","Cybersecurity Analyst","Cloud Architect","DevOps Engineer",
    "Game Developer","Quantum Computing Engineer"
  ],

  "💰 Finance": [
    "Investment Banker","Financial Analyst","Quantitative Trader",
    "Portfolio Manager","Wealth Manager","Risk Manager","Actuary"
  ],

  "🏥 Medical": [
    "Surgeon","Cardiologist","Neurologist","Radiologist",
    "Psychiatrist","Geneticist","Epidemiologist"
  ],

  "⚖️ Law": [
    "Corporate Lawyer","Criminal Lawyer","Cyber Law Expert","Tax Lawyer"
  ],

  "⚙️ Engineering": [
    "Mechanical Engineer","Civil Engineer","Electrical Engineer",
    "Robotics Engineer","Aerospace Engineer"
  ],

  "🎨 Creative": [
    "YouTuber","Photographer","Animator","DJ","Actor","Filmmaker"
  ],

  "🚀 Space": [
    "Rocket Propulsion Engineer","Astrodynamics Specialist",
    "Space Data Analyst","Planetary Scientist"
  ],

  "🌊 Marine": [
    "Marine Engineer","Oceanographer","Naval Architect"
  ],

  "✈️ Sky": [
    "Pilot","Flight Attendant","Drone Pilot"
  ],

  "🧠 Niche": [
    "Perfusionist","Embryologist","Flavor Chemist",
    "Foley Artist","Ballistics Expert"
  ]
};


// 🚀 RENDER SYSTEM
const container = document.getElementById("container");

Object.keys(data).forEach(category => {

  const section = document.createElement("div");
  section.className = "section";

  const title = document.createElement("h2");
  title.innerText = category;

  const jobsDiv = document.createElement("div");
  jobsDiv.className = "jobs";

  data[category].forEach(job => {
    const span = document.createElement("span");
    span.className = "job";
    span.innerText = job;
    jobsDiv.appendChild(span);
  });

  // TOGGLE
  title.onclick = () => {
    jobsDiv.style.display =
      jobsDiv.style.display === "flex" ? "none" : "flex";
  };

  section.appendChild(title);
  section.appendChild(jobsDiv);
  container.appendChild(section);

});

</script>

</body>
</html>
