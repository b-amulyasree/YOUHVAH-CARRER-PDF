<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Career Universe</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center,
      #2a0010,
      #140008,
      #000000);
  }

  canvas {
    display: block;
  }
</style>
<style>
  body { margin:0; overflow:hidden; background:#0a0a0a; }

  canvas { display:block; }

  #bg {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    opacity:0.4;
    transition: opacity 1.5s ease;
  }

  #overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center,
      rgba(120,0,40,0.2),
      rgba(10,0,0,0.9));
    z-index:-1;
  }

  #tooltip {
    position:absolute;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:8px;
    border-radius:6px;
    display:none;
    font-family:sans-serif;
  }
</style>
</head>

<body>

<img id="bg" src="">
<div id="overlay"></div>
<div id="tooltip"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script src="script.js"></script>

</body>
</html>
